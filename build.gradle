plugins {
    id 'java'
    id 'application'
}

application {
    mainClass = 'com.steganography.Main'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.bytedeco:javacv:1.5.10'
    implementation 'org.bytedeco:javacv-platform:1.5.10'
    implementation 'org.bytedeco:openblas-platform:0.3.26-1.5.10'
}